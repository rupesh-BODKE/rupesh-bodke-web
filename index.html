<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal finance tracker — track income, expenses, and visualise spending with charts." />
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ════════════ Header ════════════ -->
  <header>
    <h1>💰 Finance Tracker</h1>
    <p>Track your income &amp; expenses</p>
  </header>

  <div class="container">

    <!-- ════════════ Summary Cards ════════════ -->
    <section class="summary">
      <div class="summary-card">
        <h2>Balance</h2>
        <div id="balance" class="summary-value positive">$0.00</div>
      </div>
      <div class="summary-card">
        <h2>Income</h2>
        <div id="income" class="summary-value income-value">$0.00</div>
      </div>
      <div class="summary-card">
        <h2>Expenses</h2>
        <div id="expense" class="summary-value expense-value">$0.00</div>
      </div>
    </section>

    <!-- ════════════ Content Grid ════════════ -->
    <div class="content-grid">

      <!-- ── Left Column: Form + Chart ── -->
      <div>
        <!-- Add Transaction Form -->
        <div class="card">
          <h3 class="card-title"><span class="icon">➕</span> Add Transaction</h3>

          <form id="transaction-form" autocomplete="off">
            <div class="form-group">
              <label for="description">Description</label>
              <input type="text" id="description" placeholder="e.g. Grocery shopping" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
              </div>
              <div class="form-group">
                <label for="type">Type</label>
                <select id="type">
                  <option value="expense">Expense</option>
                  <option value="income">Income</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category"></select>
            </div>

            <button type="submit" class="btn-submit">Add Transaction</button>
          </form>
        </div>

        <!-- Expense Chart -->
        <div class="card" style="margin-top: 1.5rem;">
          <h3 class="card-title"><span class="icon">📊</span> Expense Breakdown</h3>
          <div class="chart-wrapper">
            <canvas id="expense-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- ── Right Column: Transaction History ── -->
      <div class="card">
        <h3 class="card-title"><span class="icon">📋</span> Transaction History</h3>

        <div class="filters">
          <select id="filter-type">
            <option value="all">All</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <input type="text" id="search" placeholder="Search transactions…" />
        </div>

        <div id="no-data" class="no-data" style="display: none;">
          <div class="no-data-icon">📭</div>
          <p>No transactions yet.<br />Add one to get started!</p>
        </div>

        <ul id="transaction-list" class="transaction-list"></ul>
      </div>
    </div>
  </div>

  <!-- ════════════ Footer ════════════ -->
  <footer>
    <p>&copy; 2026 Finance Tracker. Built by Rupesh Bodke.</p>
  </footer>

  <!-- ════════════ Chart.js CDN ════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- ════════════ App Logic ════════════ -->
  <script src="app.js"></script>

</body>
</html>
